<!DOCTYPE html>
<style>
    /* Reset and canvas setup */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* body {
    background-color: #0b0114;
    height: 100vh;
    overflow: hidden;
    position: relative;
} */

/* Container spanning the screen width */
.heart-container {
    position: absolute;
    width: 100%;
    height: 100%;
    bottom: 0;
    left: 0;
}

/* Building the heart shape using a single div */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #ff3366;
    transform: rotate(-45deg); /* Rotates square into a diamond */
    bottom: -50px;             /* Starts just off-screen */
    opacity: 0;
    animation: flyUp 6s linear infinite;
}

/* Pseudo-elements form the rounded tops of the heart */
.heart::before,
.heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background-color: #ff3366;
    border-radius: 50%;
}

.heart::before {
    top: -10px;
    left: 0;
}

.heart::after {
    left: 10px;
    top: 0;
}

/* Defining unique animation variations for each heart */
.h1 { left: 10%; animation-duration: 5s; animation-delay: 0s; transform: scale(0.6) rotate(-45deg); }
.h2 { left: 30%; animation-duration: 7s; animation-delay: 1.5s; transform: scale(1.1) rotate(-45deg); background-color: #ff66b2; }
.h3 { left: 50%; animation-duration: 6s; animation-delay: 0.8s; transform: scale(0.8) rotate(-45deg); }
.h4 { left: 70%; animation-duration: 8s; animation-delay: 2.2s; transform: scale(1.3) rotate(-45deg); background-color: #ff0044; }
.h5 { left: 85%; animation-duration: 5.5s; animation-delay: 0.3s; transform: scale(0.7) rotate(-45deg); }

/* Apply secondary colors to pseudo-elements for modified classes */
.h2::before, .h2::after { background-color: #ff66b2; }
.h4::before, .h4::after { background-color: #ff0044; }

/* The flying and swaying logic */
@keyframes flyUp {
    0% {
        bottom: -50px;
        opacity: 0;
        margin-left: 0px;
    }
    10% {
        opacity: 0.8;
    }
    50% {
        margin-left: 30px; /* Sways to the right midway */
    }
    90% {
        opacity: 0.8;
    }
    100% {
        bottom: 110vh;     /* Arrives past the top boundary */
        opacity: 0;
        margin-left: -30px; /* Drifts left at the end */
    }
}
</style>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flying Hearts Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="heart-container">
        <div class="heart h1"></div>
        <div class="heart h2"></div>
        <div class="heart h3"></div>
        <div class="heart h4"></div>
        <div class="heart h5"></div>
    </div>

</body>
</html>
