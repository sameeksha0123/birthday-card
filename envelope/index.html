<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envelope open Animation</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="envlope-wrapper">
    <div id="envelope" class="close">
        <div class="front flap"></div>
        <div class="front pocket"></div>
        <div class="letter">
            <div class="words line1"></div>
            <div class="words line2"></div>
            <div class="words line3"></div>
            <div class="words line4"></div>
        </div>
        <div class="hearts">
            <div class="heart a1"></div>
            <div class="heart a2"></div>
            <div class="heart a3"></div>
        </div>
        <div class="grid-container pics">
            <!-- <div class="pic a1"> -->
                <img  class="pic a1" src="../assets/images/IMG_4130.JPG">
                <img  class="pic a2" src="../assets/images/IMG_4514.JPG">
                <img  class="pic a3" src="../assets/images/IMG_5169.JPG">
                <img  class="pic a1" src="../assets/images/IMG_5264.JPG">
                <img  class="pic a2" src="../assets/images/IMG_5717.JPG">

            <!-- </div> -->
        </div>
    </div>
</div>
<div class="reset">
    <button id="open">Open</button>
    <button id="reset">Reset</button>
</div>
<script src="https://googleapis.com"></script>
<script type="text/javascript" src="http://code.jquery.com/jquery-1.7.1.min.js"></script>

<script src="script.js"></script> <!-- Now $ works perfectly! -->

</body>
</html>
